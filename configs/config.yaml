defaults:
  - _self_
  - model: small

ngpus: 0
cuda: 0
random_seed: 100
work_dir: ./
loss_type: score_entropy

training:
  data: ML1M
  batch_size: 256
  accum: 1
  n_iters: 2000000
  snapshot_freq: 50000
  log_freq: 2000
  eval_freq: 10000
  snapshot_freq_for_preemption: 10000
  weight: standard
  snapshot_sampling: True
  ema: 0.9999
  nonpreference_user_ratio: 0.1
  early_stop_patience: 0
  early_stop_min_step: 0
  early_stop_metric: ndcg10
  early_stop_strength: p2
  early_stop_min_delta: 0.0
  startup_probe_only: False

data:
  Steam:
    path: dataset/steam
    seq_len: 10
    item_num: 9265
  Beauty:
    path: dataset/Beauty
    seq_len: 10
    item_num: 12101
  ASO:
    path: dataset/ASO
    seq_len: 10
    item_num: 18357
  ATG: 
    path: dataset/ATG
    seq_len: 10
    item_num: 11924
  ATV: 
    path: dataset/ATV
    seq_len: 10
    item_num: 44014
  ML1M:
    path: dataset/ML1M
    seq_len: 10
    item_num: 3883

graph:
# point | pair | hybrid | adaptive
  type: point
  is_disliked_item: True
  gamma: 0.5
  file: data
  report_all: False

noise:
  # geometric | loglinear
  type: geometric
  sigma_min: 1e-3
  sigma_max: 10

sampling:
  predictor: analytic
  steps: 20
  noise_removal: True
  personalization_strength: 2

text_side:
  enabled: False
  dataset_dir: null
  text_bank_path: null
  embeddings_path: null
  temperature: 0.2
  min_pseudo_mass: 0.05
  kernel_version: v1
  g_max: 0.5
  agreement_null_curve_path: null
  text_utility_report_path: null
  gate_dataset_scale_override: null
  require_gate_source: False
  agreement_k: 2.0
  agreement_weight: 0.45
  completeness_weight: 0.15
  history_reliability_weight: 0.40
  ess_weight: 0.20
  recency_weight: 0.30
  stability_weight: 0.50
  max_temperature_scale: 2.0
  popularity_mix_scale: 1.0
  popularity_mix_power: 1.0
  center_embeddings: False
  pseudo_mass_scale: 1.0
  pseudo_mass_power: 1.0
  ablation_mode: none
  injection_mode: kernel
  encoder_context_scale: 1.0
  loss_weight_scale: 1.0

eval:
  batch_size: 256
  perplexity: True
  perplexity_batch_size: 32

optim:
  weight_decay: 0
  optimizer: AdamW
  lr: 1e-3
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8
  warmup: 2500
  grad_clip: 1.

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
